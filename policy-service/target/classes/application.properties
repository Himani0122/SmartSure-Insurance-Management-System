spring.application.name=policy-service
server.port=8084

spring.config.import=configserver:http://${CONFIG_SERVER_HOST:config-server}:8888

spring.datasource.url= jdbc:postgresql://${DB_HOST:localhost}:5432/policy_db
spring.datasource.username=postgres
spring.datasource.password=password

# eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

eureka.client.serviceUrl.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka/

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Local fallback for Redis cache
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans
springdoc.api-docs.path=/api/v1/policies/v3/api-docs

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true

