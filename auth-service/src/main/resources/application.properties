spring.application.name=auth-service
server.port=8083

spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:config-server}:8888

eureka.client.serviceUrl.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka/

# ✅ ADD THIS
# eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=root

jwt.secret=4e78a6d91f2c4b8e3a5d7f0c9b1e2a8d4c6f5a3b2d1e0c9b8a7f6d5e4c3b2a1
jwt.expiration=86400000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans
springdoc.api-docs.path=/api/v1/auth/v3/api-docs
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
# management.metrics.export.prometheus.enabled=true