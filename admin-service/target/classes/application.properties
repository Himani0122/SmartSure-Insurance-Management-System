spring.application.name=admin-service
server.port=8087

spring.config.import=configserver:http://${CONFIG_SERVER_HOST:config-server}:8888

eureka.client.serviceUrl.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka/

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Resilience4j configuration
resilience4j.circuitbreaker.instances.claimsService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.claimsService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.claimsService.waitDurationInOpenState=10000
resilience4j.circuitbreaker.instances.claimsService.permittedNumberOfCallsInHalfOpenState=3

resilience4j.retry.instances.claimsService.maxAttempts=3
resilience4j.retry.instances.claimsService.waitDuration=2000

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans
springdoc.api-docs.path=/api/v1/admin/v3/api-docs
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
