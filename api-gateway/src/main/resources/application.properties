server.port=8090
spring.application.name=api-gateway

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# AUTH SERVICE
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8083
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

# POLICY SERVICE
spring.cloud.gateway.routes[1].id=policy-service
spring.cloud.gateway.routes[1].uri=http://localhost:8084
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/policies/**
spring.cloud.gateway.routes[1].filters[0].name=AuthenticationFilter

# CLAIMS SERVICE
spring.cloud.gateway.routes[2].id=claims-service
spring.cloud.gateway.routes[2].uri=http://localhost:8089
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/claims/**
spring.cloud.gateway.routes[2].filters[0].name=AuthenticationFilter

# ADMIN SERVICE
spring.cloud.gateway.routes[3].id=admin-service
spring.cloud.gateway.routes[3].uri=http://localhost:8087
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/admin/**
spring.cloud.gateway.routes[3].filters[0].name=AuthenticationFilter

# CONFIG SERVER
spring.cloud.gateway.routes[4].id=config-server
spring.cloud.gateway.routes[4].uri=http://localhost:8888
spring.cloud.gateway.routes[4].predicates[0]=Path=/config/**

# SERVICE REGISTRY (EUREKA)
spring.cloud.gateway.routes[5].id=service-registry
spring.cloud.gateway.routes[5].uri=http://localhost:8761
spring.cloud.gateway.routes[5].predicates[0]=Path=/eureka/**

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# \u2705 ADD THIS
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

jwt.secret=4e78a6d91f2c4b8e3a5d7f0c9b1e2a8d4c6f5a3b2d1e0c9b8a7f6d5e4c3b2a1

management.tracing.sampling.probability=1.0

# Swagger UI Aggregation Configuration
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/api/v1/auth/v3/api-docs

springdoc.swagger-ui.urls[1].name=Policy Service
springdoc.swagger-ui.urls[1].url=/api/v1/policies/v3/api-docs

springdoc.swagger-ui.urls[2].name=Claims Service
springdoc.swagger-ui.urls[2].url=/api/v1/claims/v3/api-docs

springdoc.swagger-ui.urls[3].name=Admin Service
springdoc.swagger-ui.urls[3].url=/api/v1/admin/v3/api-docs
