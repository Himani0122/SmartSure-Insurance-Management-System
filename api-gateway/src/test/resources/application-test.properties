spring.application.name=api-gateway-test
server.port=8082

# Disable Eureka/Config Server for tests
eureka.client.enabled=false
spring.cloud.config.enabled=false
spring.config.import=

# JWT Secret (must match the one in JwtUtil)
jwt.secret=4e78a6d91f2c4b8e3a5d7f0c9b1e2a8d4c6f5a3b2d1e0c9b8a7f6d5e4c3b2a1

# Routes for tests (Local WireMock)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[1].id=policy-service
spring.cloud.gateway.routes[1].uri=http://localhost:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/policies/**

spring.cloud.gateway.routes[2].id=claims-service
spring.cloud.gateway.routes[2].uri=http://localhost:8081
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/claims/**
