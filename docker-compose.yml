version: '3.8'

services:
  # ===== DATABASES =====
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: smartcourier
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===== MESSAGING (RabbitMQ) =====
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running || exit 0"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ===== OBSERVABILITY =====
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  # ===== SONARQUBE (only starts with: docker-compose --profile sonar up -d) =====
  sonarqube-db:
    image: postgres:15-alpine
    container_name: sonarqube-db
    profiles: ["sonar"]
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonarqube-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 5s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    profiles: ["sonar"]
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 1g
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    depends_on:
      sonarqube-db:
        condition: service_healthy

  # ===== MICROSERVICES =====
  config-server:
    build: 
      context: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - RABBITMQ_HOST=rabbitmq
    volumes:
      - ./config-repo:/app/config-repo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      rabbitmq:
        condition: service_healthy

  service-registry:
    build: 
      context: ./service-registry
    container_name: service-registry
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy

  auth-service:
    build: 
      context: ./auth-service
    container_name: auth-service
    ports:
      - "8083:8083"
    environment:
      - DB_HOST=postgres
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - ZIPKIN_HOST=zipkin
      - EUREKA_HOST=service-registry
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_started

  policy-service:
    build: 
      context: ./policy-service
    container_name: policy-service
    ports:
      - "8084:8084"
    environment:
      - DB_HOST=postgres
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - ZIPKIN_HOST=zipkin
      - EUREKA_HOST=service-registry
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_started

  claims-service:
    build: 
      context: ./claims-service
    container_name: claims-service
    ports:
      - "8089:8089"
    environment:
      - DB_HOST=postgres
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - ZIPKIN_HOST=zipkin
      - EUREKA_HOST=service-registry
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_started

  admin-service:
    build: 
      context: ./admin-service
    container_name: admin-service
    ports:
      - "8087:8087"
    environment:
      - DB_HOST=postgres
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - ZIPKIN_HOST=zipkin
      - EUREKA_HOST=service-registry
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_started

  api-gateway:
    build: 
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8090:8090"
    environment:
      - DB_HOST=postgres
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - ZIPKIN_HOST=zipkin
      - EUREKA_HOST=service-registry
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
    depends_on:
      service-registry:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
  sonarqube-db-data:
